<title>ドラゴンの黒字大作戦</title>
<style>
  :root{
    --gold:#f4c14f; --gold-deep:#c98f1d; --red:#e8574a; --red-deep:#a32e2e;
    --ink:#0c0a14; --panel:#181327; --text:#f3ead6; --muted:#a99c86;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #241a3a 0%, transparent 60%),
      var(--ink);
    color:var(--text);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;
    display:flex; align-items:center; justify-content:center;
    min-height:100dvh; overflow:hidden;
    -webkit-user-select:none; user-select:none;
    touch-action:none;
  }
  #stage{
    position:relative; overflow:hidden;
    border-radius:14px;
    box-shadow:0 0 0 1px rgba(244,193,79,.25), 0 24px 80px rgba(0,0,0,.7);
    background:#12060a;
  }
  canvas{display:block}

  /* ---------- HUD ---------- */
  #hud{
    position:absolute; inset:0; pointer-events:none;
    display:none;
  }
  #hud.on{display:block}
  .hud-top{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:12px 46px 0 14px;
  }
  .money{
    font-variant-numeric:tabular-nums;
    font-family:Consolas,"Courier New",monospace;
    font-size:26px; font-weight:700; letter-spacing:.5px;
    color:var(--red);
    text-shadow:0 2px 10px rgba(0,0,0,.8);
    transition:color .3s;
  }
  .money.plus{color:var(--gold)}
  .money-label{
    font-size:10px; letter-spacing:.25em; color:var(--muted);
    text-transform:uppercase; margin-bottom:2px;
  }
  .coins{
    text-align:right;
    font-variant-numeric:tabular-nums;
    font-family:Consolas,"Courier New",monospace;
    font-size:15px; font-weight:700; color:var(--gold);
    text-shadow:0 2px 8px rgba(0,0,0,.8);
  }
  /* progress rail */
  #rail{
    position:absolute; top:44px; bottom:24px; right:14px; width:10px;
    border-radius:5px;
    background:rgba(255,255,255,.08);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
  }
  #railFill{
    position:absolute; left:0; right:0; bottom:0; height:0%;
    border-radius:5px;
    background:linear-gradient(180deg, var(--gold), var(--red-deep));
  }
  #railGoal{
    position:absolute; top:-4px; left:-5px; width:20px; height:8px;
    border-radius:4px; background:var(--gold);
    box-shadow:0 0 10px var(--gold);
  }
  .rail-label{
    position:absolute; right:-2px; font-size:9px; letter-spacing:.15em;
    color:var(--muted); writing-mode:vertical-rl;
  }
  .rail-label.top{top:-2px; right:16px; color:var(--gold)}
  .rail-label.btm{bottom:-2px; right:16px; color:var(--red)}

  /* ---------- Overlays ---------- */
  .overlay{
    position:absolute; inset:0; z-index:5;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:28px;
    background:rgba(10,7,18,.78);
    backdrop-filter:blur(3px);
  }
  .overlay.hidden{display:none}
  .eyebrow{
    font-size:11px; letter-spacing:.4em; color:var(--gold-deep);
    margin-bottom:14px;
  }
  h1{
    font-size:clamp(28px,8vw,40px); font-weight:900; line-height:1.25;
    text-wrap:balance;
    background:linear-gradient(180deg,#ffe9a8 20%, var(--gold) 55%, var(--gold-deep));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 3px 12px rgba(244,193,79,.25));
    margin-bottom:10px;
  }
  .sub{font-size:13px; color:var(--text); opacity:.85; line-height:1.9; margin-bottom:22px; text-wrap:balance}
  .howto{
    font-size:11.5px; color:var(--muted); line-height:2;
    border:1px solid rgba(244,193,79,.22); border-radius:10px;
    padding:10px 18px; margin-bottom:26px;
  }
  .howto b{color:var(--gold)}
  .btn{
    pointer-events:auto; cursor:pointer;
    font-family:inherit; font-size:16px; font-weight:800; letter-spacing:.12em;
    color:#241500;
    background:linear-gradient(180deg,#ffe08a,var(--gold) 55%,var(--gold-deep));
    border:none; border-radius:12px; padding:14px 44px;
    box-shadow:0 6px 0 #7a5510, 0 14px 30px rgba(0,0,0,.5);
    transition:transform .08s, box-shadow .08s;
  }
  .btn:hover{transform:translateY(-2px)}
  .btn:active{transform:translateY(3px); box-shadow:0 3px 0 #7a5510, 0 8px 18px rgba(0,0,0,.5)}
  .btn:focus-visible{outline:3px solid #fff; outline-offset:3px}

  h2.result{font-size:clamp(26px,7vw,36px); font-weight:900; margin-bottom:8px}
  h2.result.lose{color:var(--red); text-shadow:0 0 24px rgba(232,87,74,.4)}
  h2.result.win{
    background:linear-gradient(180deg,#fff3c4,var(--gold) 60%,var(--gold-deep));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 24px rgba(244,193,79,.45));
  }
  .reason{font-size:13px; color:var(--muted); margin-bottom:18px}
  .stats{
    font-variant-numeric:tabular-nums;
    font-family:Consolas,"Courier New",monospace;
    font-size:14px; line-height:2.1; color:var(--text);
    border-top:1px solid rgba(244,193,79,.25);
    border-bottom:1px solid rgba(244,193,79,.25);
    padding:10px 26px; margin-bottom:26px;
  }
  .stats span{color:var(--gold); font-weight:700}
  .stats .neg{color:var(--red)}

  #titleDragon{margin-bottom:6px}
  @media (prefers-reduced-motion:no-preference){
    #titleDragon{animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  }
  .credit{position:absolute; bottom:10px; font-size:9px; letter-spacing:.2em; color:rgba(169,156,134,.55)}
</style>

<div id="stage">
  <canvas id="cv"></canvas>

  <div id="hud">
    <div class="hud-top">
      <div>
        <div class="money-label">決算まで</div>
        <div class="money" id="money">あと 30.0秒</div>
      </div>
    </div>
    <div id="rail">
      <div id="railFill"></div>
      <div id="railGoal"></div>
      <div class="rail-label top">黒字</div>
      <div class="rail-label btm">赤字</div>
    </div>
  </div>

  <div class="overlay" id="titleOv">
    <canvas id="titleDragon" width="140" height="120"></canvas>
    <div class="eyebrow">KEIEI ACTION GAME</div>
    <h1>ドラゴンの<br>黒字大作戦</h1>
    <p class="sub">決算までの<b>30秒</b>を生き延びろ。<br>経費・労災・ラーメン・事故車をかわせば黒字達成！</p>
    <div class="howto">
      <b>← →</b> キー / <b>画面タッチ</b> で左右に移動<br>
      <b>15秒経過で社長が燃え上がり、落下速度1.5倍</b><br>
      障害物に当たったら <b>即・赤字転落</b>
    </div>
    <button class="btn" id="startBtn">操業開始</button>
    <div class="credit">TOSHIN WOOD ARCADE</div>
  </div>

  <div class="overlay hidden" id="overOv">
    <h2 class="result lose">赤字転落……</h2>
    <p class="reason" id="overReason">経費に激突！</p>
    <div class="stats">
      生存タイム <span class="neg" id="overTime">12.4秒</span> ／ 30秒
    </div>
    <button class="btn" id="retryBtn">再挑戦</button>
  </div>

  <div class="overlay hidden" id="clearOv">
    <h2 class="result win">黒字達成!!</h2>
    <p class="reason">社長ドラゴンは30秒の決算期を生き延びた。</p>
    <div class="stats">
      耐久タイム <span id="clearTime">30.0秒</span>
    </div>
    <button class="btn" id="replayBtn">もう一期がんばる</button>
  </div>
</div>

let W = 420, H = 720, dpr = 1;
function resize(){
  dpr = Math.min(devicePixelRatio || 1, 2);
  W = Math.min(440, innerWidth);
  H = Math.min(780, innerHeight);
  stage.style.width = W + 'px';
  stage.style.height = H + 'px';
  cv.width = Math.round(W * dpr);
  cv.height = Math.round(H * dpr);
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
addEventListener('resize', resize);

/* ---------- audio ---------- */
let ac = null;
function audio(){ if(!ac){ try{ ac = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(ac && ac.state==='suspended') ac.resume(); }
function tone(f, t0, dur, type, vol){
  if(!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.value = f;
  g.gain.setValueAtTime(vol, ac.currentTime + t0);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + t0 + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(ac.currentTime + t0); o.stop(ac.currentTime + t0 + dur + .02);
}
const sfx = {
  start(){ tone(440,0,.09,'square',.06); tone(660,.09,.12,'square',.06); },
  hit(){ tone(220,0,.25,'sawtooth',.09); tone(110,.05,.4,'sawtooth',.09); },
  demon(){ tone(90,0,.4,'sawtooth',.1); tone(65,.12,.55,'sawtooth',.1); tone(1200,.05,.1,'square',.04); },
  clear(){ [523,659,784,1047,1319].forEach((f,i)=>tone(f,i*.11,.22,'square',.055)); }
};

/* ---------- game state ---------- */
const GOAL_TIME = 30;                  // 30秒耐えたら黒字達成
const DEMON_TIME = 15;                 // 15秒から鬼モード（目が光る・落下1.5倍）
let mode = 'title';                    // title | playing | over | clear
let elapsed, scrollTotal, shake, demonOn;
let player, obstacles, particles, spawnT, deathReason;

function reset(){
  elapsed = 0; scrollTotal = 0; shake = 0; demonOn = false;
  player = { x: W/2, tx: W/2, y: H*0.76, r: 27, vx: 0, tilt: 0, wing: 0 };
  obstacles = []; particles = [];
  spawnT = 1.1; deathReason = '';
}

const progress = () => Math.min(1, elapsed / GOAL_TIME);
const speed = () => 230 + 210 * progress();   // px/s

/* ---------- input ---------- */
const keys = {};
addEventListener('keydown', e => {
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  keys[e.key] = true;
});
addEventListener('keyup', e => keys[e.key] = false);

let pointing = false;
function toStageX(e){ const r = cv.getBoundingClientRect(); return (e.clientX - r.left); }
stage.addEventListener('pointerdown', e => { if(mode!=='playing') return; pointing = true; player.tx = toStageX(e); });
stage.addEventListener('pointermove', e => { if(pointing && mode==='playing') player.tx = toStageX(e); });
addEventListener('pointerup', () => pointing = false);

/* ---------- spawning ---------- */
function spawnObstacle(){
  const p = progress();
  const roll = Math.random();
  const x = 26 + Math.random() * (W - 52);
  if(roll < 0.26){                        // 経費の請求書
    obstacles.push({ kind:'paper', x, x0:x, y:-70, r:24, vy: 50+Math.random()*70,
      ph: Math.random()*6.28, rot: 0 });
  } else if(roll < 0.48){                 // 炭水化物（ラーメン）
    obstacles.push({ kind:'blob', x, y:-70, r: 24+Math.random()*12, vy: 25+Math.random()*55,
      ph: Math.random()*6.28 });
  } else if(roll < 0.66){                 // 鋸刃（製材所の魂）
    obstacles.push({ kind:'saw', x, y:-70, r:25, vy: 12+Math.random()*35,
      vx: (Math.random()<.5?-1:1)*(60+120*p), rot: 0 });
  } else if(roll < 0.84){                 // 労災（加速して落ちてくる警告標識・特大）
    obstacles.push({ kind:'rousai', x, y:-120, r:52, vy: 10,
      ay: 190+160*p, ph: Math.random()*6.28 });
  } else {                                // アルファード（煙を上げて高速回転しながら落下）
    obstacles.push({ kind:'car', x, y:-90, r:32, vy: 35+Math.random()*50,
      rot: Math.random()*6.28, vr: (Math.random()<.5?-1:1)*(2.4+Math.random()*1.6),
      ph: Math.random()*6.28 });
  }
}

/* ---------- particles ---------- */
function burst(x, y, color, n, spd){
  for(let i=0;i<n;i++){
    const a = Math.random()*6.28, v = spd*(0.3+Math.random());
    particles.push({ x, y, vx:Math.cos(a)*v, vy:Math.sin(a)*v, life:1, color, r:2+Math.random()*3 });
  }
}

/* ---------- update ---------- */
function update(dt){
  elapsed += dt;
  if(!demonOn && elapsed >= DEMON_TIME){
    demonOn = true;
    if(!reduceMotion) shake = 0.7;
    burst(player.x, player.y - 30, '#ff5040', 24, 220);
    sfx.demon();
  }
  const fallMul = demonOn ? 1.5 : 1;
  const sp = speed();
  scrollTotal += sp * fallMul * dt;
  player.wing += dt * (10 + 6*progress());

  // input
  let kx = 0;
  if(keys['ArrowLeft'] || keys['a'] || keys['A']) kx -= 1;
  if(keys['ArrowRight'] || keys['d'] || keys['D']) kx += 1;
  if(kx !== 0){
    player.x += kx * 360 * dt;
    player.tx = player.x;
  } else {
    player.x += (player.tx - player.x) * Math.min(1, dt*10);
  }
  player.x = Math.max(player.r+4, Math.min(W-player.r-4, player.x));
  player.tilt += ((player.tx - player.x)*0.02 + kx*0.35 - player.tilt) * Math.min(1, dt*8);

  // spawn
  spawnT -= dt;
  if(spawnT <= 0){ spawnObstacle(); spawnT = Math.max(0.42, 0.95 - 0.5*progress()) * (0.7 + Math.random()*0.6); }

  // obstacles
  for(let i=obstacles.length-1; i>=0; i--){
    const o = obstacles[i];
    o.y += (sp + o.vy) * fallMul * dt;
    if(o.kind==='paper'){ o.ph += dt*2.2; o.x = o.x0 + Math.sin(o.ph)*42; o.rot = Math.sin(o.ph)*0.35; }
    if(o.kind==='blob'){ o.ph += dt*4; }
    if(o.kind==='saw'){
      o.x += o.vx*dt; o.rot += dt*9;
      if(o.x < o.r+4){ o.x = o.r+4; o.vx *= -1; }
      if(o.x > W-o.r-4){ o.x = W-o.r-4; o.vx *= -1; }
    }
    if(o.kind==='rousai'){ o.vy += o.ay*dt; o.ph += dt*10; }
    if(o.kind==='car'){ o.rot += o.vr*dt; o.ph += dt*3; }
    if(o.y > H+90){ obstacles.splice(i,1); continue; }
    const rr = player.r + o.r - 6; // 少し甘め
    const dx = o.x-player.x, dy = o.y-player.y;
    if(dx*dx + dy*dy < rr*rr) return die(o.kind);
  }

  // 鬼モード: 火の粉が舞い上がる
  if(demonOn && !reduceMotion && Math.random() < 0.6){
    const colors = ['#ffd76b', '#ff9a3c', '#ff6a2a'];
    particles.push({
      x: player.x + (Math.random()-0.5)*70,
      y: player.y - 30 - Math.random()*20,
      vx: (Math.random()-0.5)*50,
      vy: -90 - Math.random()*140,
      life: 0.5 + Math.random()*0.5,
      color: colors[(Math.random()*3)|0],
      r: 1.5 + Math.random()*2.5
    });
  }

  // particles
  for(let i=particles.length-1; i>=0; i--){
    const p = particles[i];
    p.x += p.vx*dt; p.y += p.vy*dt + sp*dt*0.4; p.life -= dt*1.6;
    if(p.life <= 0) particles.splice(i,1);
  }

  shake = Math.max(0, shake - dt*6);
  if(elapsed >= GOAL_TIME) return win();
}

function die(kind){
  deathReason = kind==='paper' ? '経費の請求書に激突！'
              : kind==='blob' ? 'ラーメン（炭水化物）を食べてしまった！'
              : kind==='rousai' ? '労災が発生した！！'
              : kind==='car' ? '車両事故を起こしてしまった！！'
              : '鋸刃に切り刻まれた！';
  burst(player.x, player.y, '#e8574a', 26, 240);
  burst(player.x, player.y, '#f4c14f', 12, 180);
  if(!reduceMotion) shake = 1;
  sfx.hit();
  mode = 'over';
  document.getElementById('overReason').textContent = deathReason;
  document.getElementById('overTime').textContent = elapsed.toFixed(1) + '秒';
  setTimeout(()=>show('overOv'), 550);
}

function win(){
  sfx.clear();
  burst(player.x, player.y, '#f4c14f', 40, 260);
  mode = 'clear';
  document.getElementById('clearTime').textContent = GOAL_TIME.toFixed(1) + '秒';
  setTimeout(()=>show('clearOv'), 700);
}

/* ---------- drawing ---------- */
function lerp(a,b,t){ return a+(b-a)*t; }
function lerpC(c1,c2,t){
  return 'rgb(' + Math.round(lerp(c1[0],c2[0],t)) + ',' + Math.round(lerp(c1[1],c2[1],t)) + ',' + Math.round(lerp(c1[2],c2[2],t)) + ')';
}
// 空: 赤字圏 → 深夜 → 黒字の暁
const SKY = [
  { p:0,   top:[42,11,20],  btm:[24,7,12] },
  { p:0.55,top:[16,20,46],  btm:[30,16,48] },
  { p:1,   top:[43,36,16],  btm:[74,54,18] }
];
function skyColors(p){
  let a = SKY[0], b = SKY[1];
  if(p > 0.55){ a = SKY[1]; b = SKY[2]; }
  const t = (p - a.p) / (b.p - a.p);
  return [lerpC(a.top,b.top,t), lerpC(a.btm,b.btm,t)];
}

const stars = [];
for(let i=0;i<70;i++) stars.push({ x:Math.random(), y:Math.random()*800, f:0.15+Math.random()*0.5, s:Math.random()<0.2?2:1 });
const streaks = [];
for(let i=0;i<10;i++) streaks.push({ x:Math.random(), y:Math.random()*800, len:40+Math.random()*80 });

function flameLayer(g, rx, ry, color, t, seed){
  g.fillStyle = color;
  g.beginPath();
  for(let a = 0; a <= 6.3; a += 0.18){
    const up = Math.sin(a) < 0 ? 1.6 : 0.6;   // 上半分ほど炎が長く伸びる
    const n = 1 + (Math.sin(a*7 + t*9 + seed)*0.17 + Math.sin(a*3 - t*6 + seed*2)*0.12) * up;
    const px = Math.cos(a) * rx * n;
    const py = Math.sin(a) * ry * n - (Math.sin(a) < 0 ? 8 : 0);
    a === 0 ? g.moveTo(px, py) : g.lineTo(px, py);
  }
  g.closePath(); g.fill();
}

function drawDragon(g, x, y, tilt, wing, scale, demon){
  g.save();
  g.translate(x, y);
  g.rotate(tilt);
  g.scale(scale, scale);
  // 鬼モード: 顔が燃える（炎は顔の後ろに3層）
  if(demon){
    const t = wing;
    const glow = g.createRadialGradient(0, 0, 24, 0, 0, 82);
    glow.addColorStop(0, 'rgba(255,130,35,.5)');
    glow.addColorStop(1, 'rgba(255,60,20,0)');
    g.fillStyle = glow;
    g.beginPath(); g.arc(0, 0, 82, 0, 6.29); g.fill();
    flameLayer(g, 52, 58, 'rgba(200,40,15,.85)', t, 0);
    flameLayer(g, 46, 52, 'rgba(255,110,25,.9)', t, 3.7);
    flameLayer(g, 41, 47, 'rgba(255,205,80,.9)', t, 7.9);
  }
  // face (社長の顔のみ・特大)
  if(FACE.complete && FACE.naturalWidth){
    g.drawImage(FACE, -39, -44, 78, 87);
  } else {
    g.fillStyle = '#d68f85';
    g.beginPath(); g.ellipse(0, 0, 36, 41, 0, 0, 6.29); g.fill();
  }
  g.restore();
}

function drawObstacle(g, o){
  g.save();
  g.translate(o.x, o.y);
  if(o.kind === 'paper'){
    g.rotate(o.rot);
    g.fillStyle = '#f5f0e6';
    g.strokeStyle = '#c9bfa8'; g.lineWidth = 1.5;
    g.beginPath(); g.rect(-21,-28, 42, 56); g.fill(); g.stroke();
    g.strokeStyle = '#b9ad93'; g.lineWidth = 1;
    for(let i=-1;i<=2;i++){ g.beginPath(); g.moveTo(-14, 4+i*7); g.lineTo(14, 4+i*7); g.stroke(); }
    g.fillStyle = '#a32e2e';
    g.font = '900 15px sans-serif'; g.textAlign='center'; g.textBaseline='middle';
    g.fillText('経費', 0, -14);
    g.strokeStyle = '#a32e2e'; g.lineWidth = 2;
    g.beginPath(); g.arc(11, 18, 8, 0, 6.29); g.stroke();
  } else if(o.kind === 'blob'){
    // 炭水化物: ラーメン
    const s = o.r / 26;
    g.scale(s, s);
    // 湯気
    g.strokeStyle = 'rgba(255,255,255,' + (0.35 + 0.25*Math.sin(o.ph)).toFixed(2) + ')';
    g.lineWidth = 3; g.lineCap = 'round';
    for(const sx of [-11, 1, 12]){
      g.beginPath();
      g.moveTo(sx, -16);
      g.quadraticCurveTo(sx + 6*Math.sin(o.ph + sx), -29, sx, -42);
      g.stroke();
    }
    // 麺（丼から盛り上がる）
    g.fillStyle = '#f2d16b';
    g.beginPath(); g.ellipse(0, -4, 24, 9, 0, 0, 6.29); g.fill();
    g.strokeStyle = '#d9b44a'; g.lineWidth = 1.5;
    for(let i=-3; i<=3; i++){
      g.beginPath();
      g.moveTo(i*6-3, -10);
      g.quadraticCurveTo(i*6, -4, i*6-2, -1);
      g.stroke();
    }
    // ナルト
    g.fillStyle = '#fff';
    g.beginPath(); g.arc(9, -8, 6, 0, 6.29); g.fill();
    g.strokeStyle = '#e88a9a'; g.lineWidth = 1.5;
    g.beginPath(); g.arc(9, -8, 3, 0, 4.5); g.stroke();
    // ネギ
    g.fillStyle = '#5da44e';
    g.fillRect(-15,-11,4,3); g.fillRect(-6,-13,4,3); g.fillRect(1,-10,4,3);
    // 丼
    g.fillStyle = '#d94f3d';
    g.beginPath();
    g.moveTo(-27,-2);
    g.quadraticCurveTo(-24,20, 0,22);
    g.quadraticCurveTo(24,20, 27,-2);
    g.closePath(); g.fill();
    // 高台
    g.fillStyle = '#b13c2c';
    g.fillRect(-9,22,18,4);
    // 縁と渦巻模様
    g.strokeStyle = '#fff'; g.lineWidth = 3;
    g.beginPath(); g.moveTo(-27,-1); g.lineTo(27,-1); g.stroke();
    g.strokeStyle = 'rgba(255,255,255,.85)'; g.lineWidth = 2;
    for(const mx of [-13, 0, 13]){
      g.beginPath(); g.arc(mx, 9, 4, 0, 4.7); g.stroke();
    }
  } else if(o.kind === 'car'){
    // アルファード（煙モクモク・高速回転落下）
    const s = o.r / 32;
    g.scale(s, s);
    // 煙（回転に関係なく上へ立ちのぼる）
    g.lineCap = 'round';
    for(let i = 0; i < 4; i++){
      const sx = -18 + i*12;
      g.strokeStyle = 'rgba(170,170,175,' + (0.55 + 0.3*Math.sin(o.ph + i*1.7)).toFixed(2) + ')';
      g.lineWidth = 6 + 2*Math.sin(o.ph*1.3 + i);
      g.beginPath();
      g.moveTo(sx, -14);
      g.quadraticCurveTo(sx + 9*Math.sin(o.ph + i*2.1), -34, sx + 4*Math.sin(o.ph*0.7 + i), -54);
      g.stroke();
    }
    g.fillStyle = 'rgba(190,190,195,' + (0.4 + 0.2*Math.sin(o.ph*1.1)).toFixed(2) + ')';
    for(let i = 0; i < 3; i++){
      const bx = -14 + i*14 + 5*Math.sin(o.ph + i*2.5);
      const by = -44 - 8*((Math.sin(o.ph*0.9 + i*1.3)+1)/2);
      g.beginPath(); g.arc(bx, by, 7 + 2*Math.sin(o.ph + i), 0, 6.29); g.fill();
    }
    // ここから車体（回転）
    g.rotate(o.rot);
    // ボディ（箱型ミニバン・無傷）
    g.fillStyle = '#f0f2f5';
    g.strokeStyle = '#7e8794'; g.lineWidth = 2; g.lineJoin = 'round';
    g.beginPath();
    g.moveTo(-36, 10);
    g.lineTo(-36, -8);
    g.quadraticCurveTo(-36, -16, -28, -16);   // リア角
    g.lineTo(14, -16);                         // 長くまっすぐな屋根
    g.quadraticCurveTo(20, -16, 25, -10);      // Aピラー
    g.lineTo(33, -7);                          // ボンネット
    g.quadraticCurveTo(36, -6, 36, -2);        // ノーズ
    g.lineTo(36, 10);
    g.closePath();
    g.fill(); g.stroke();
    // 窓（大きなグラスエリア）
    g.fillStyle = '#3a4656';
    g.beginPath();   // リア〜スライドドア窓
    g.moveTo(-32, -13); g.lineTo(-3, -13); g.lineTo(-3, -5); g.lineTo(-32, -5);
    g.closePath(); g.fill();
    g.beginPath();   // セカンド窓
    g.moveTo(1, -13); g.lineTo(15, -13); g.lineTo(18, -5); g.lineTo(1, -5);
    g.closePath(); g.fill();
    g.beginPath();   // フロントガラス
    g.moveTo(21, -12); g.lineTo(26, -9); g.lineTo(31, -7); g.lineTo(23, -5); g.lineTo(21, -5);
    g.closePath(); g.fill();
    // スライドドアのライン
    g.strokeStyle = '#9aa3b0'; g.lineWidth = 1.5;
    g.beginPath(); g.moveTo(-3, -4); g.lineTo(-3, 9); g.stroke();
    g.beginPath(); g.moveTo(18, -4); g.lineTo(18, 9); g.stroke();
    // ドアハンドル
    g.fillStyle = '#8f97a3';
    g.fillRect(-10, 0, 5, 1.8); g.fillRect(10, 0, 5, 1.8);
    // フロントグリル（アルファードの顔・大型メッキ）
    g.fillStyle = '#d7dce3';
    g.beginPath();
    g.moveTo(29, -1); g.lineTo(36, -1); g.lineTo(36, 9); g.lineTo(29, 9);
    g.closePath(); g.fill();
    g.strokeStyle = '#59616d'; g.lineWidth = 1.2;
    for(let i = 0; i < 4; i++){
      g.beginPath(); g.moveTo(29, 0.5 + i*2.4); g.lineTo(36, 0.5 + i*2.4); g.stroke();
    }
    // ヘッドライト（シャープな吊り目）
    g.fillStyle = '#ffd76b';
    g.beginPath(); g.moveTo(26, -6); g.lineTo(35, -4); g.lineTo(35, -2); g.lineTo(27, -3); g.closePath(); g.fill();
    // テールランプ
    g.fillStyle = '#d94f3d';
    g.fillRect(-36, -6, 2.5, 7);
    // タイヤ
    g.fillStyle = '#20242b';
    g.beginPath(); g.arc(-20, 12, 8, 0, 6.29); g.fill();
    g.beginPath(); g.arc(22, 12, 8, 0, 6.29); g.fill();
    g.fillStyle = '#9aa2ad';
    g.beginPath(); g.arc(-20, 12, 3.5, 0, 6.29); g.fill();
    g.beginPath(); g.arc(22, 12, 3.5, 0, 6.29); g.fill();
  } else if(o.kind === 'rousai'){
    // 警告標識: 黄色い三角に「労災」
    const flash = 0.6 + 0.4*Math.sin(o.ph);
    g.shadowColor = 'rgba(247,210,75,' + flash.toFixed(2) + ')';
    g.shadowBlur = 18;
    g.fillStyle = '#f7d24b';
    g.strokeStyle = '#16130a'; g.lineWidth = 7; g.lineJoin = 'round';
    g.beginPath();
    g.moveTo(0, -o.r - 8);
    g.lineTo(o.r + 12, o.r - 8);
    g.lineTo(-o.r - 12, o.r - 8);
    g.closePath();
    g.fill(); g.stroke();
    g.shadowBlur = 0;
    g.fillStyle = '#16130a';
    g.font = '900 30px sans-serif'; g.textAlign='center'; g.textBaseline='middle';
    g.fillText('労災', 0, 22);
    g.font = '900 24px sans-serif';
    g.fillText('！', 0, -10);
  } else { // saw
    g.rotate(o.rot);
    g.fillStyle = '#b9c0cc';
    g.beginPath();
    const teeth = 12;
    for(let i=0;i<teeth;i++){
      const a1 = (i/teeth)*6.283, a2 = ((i+0.5)/teeth)*6.283, a3 = ((i+1)/teeth)*6.283;
      g.lineTo(Math.cos(a1)*o.r, Math.sin(a1)*o.r);
      g.lineTo(Math.cos(a2)*(o.r-9), Math.sin(a2)*(o.r-9));
      g.lineTo(Math.cos(a3)*o.r, Math.sin(a3)*o.r);
    }
    g.closePath(); g.fill();
    g.fillStyle = '#7e8697';
    g.beginPath(); g.arc(0,0, o.r-11, 0, 6.29); g.fill();
    g.fillStyle = '#2a2e38';
    g.beginPath(); g.arc(0,0, 5, 0, 6.29); g.fill();
  }
  g.restore();
}

function draw(){
  const p = progress();
  ctx.save();
  if(shake > 0) ctx.translate((Math.random()-0.5)*10*shake, (Math.random()-0.5)*10*shake);

  // sky
  const [top, btm] = skyColors(p);
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, top); grad.addColorStop(1, btm);
  ctx.fillStyle = grad;
  ctx.fillRect(-8,-8, W+16, H+16);

  // dawn glow near goal
  if(p > 0.7){
    const gl = ctx.createLinearGradient(0,0,0,H*0.5);
    gl.addColorStop(0, 'rgba(244,193,79,' + ((p-0.7)/0.3*0.35).toFixed(3) + ')');
    gl.addColorStop(1, 'rgba(244,193,79,0)');
    ctx.fillStyle = gl;
    ctx.fillRect(0,0,W,H*0.5);
  }

  // stars
  ctx.fillStyle = 'rgba(255,255,255,.7)';
  for(const s of stars){
    const sy = ((s.y + scrollTotal * s.f) % (H+20)) - 10;
    ctx.globalAlpha = 0.25 + 0.5*s.f * (1 - p*0.5);
    ctx.fillRect(s.x*W, sy, s.s, s.s);
  }
  ctx.globalAlpha = 1;

  // speed streaks
  if(mode === 'playing' && !reduceMotion){
    ctx.strokeStyle = 'rgba(255,255,255,.08)'; ctx.lineWidth = 2;
    for(const st of streaks){
      const sy = ((st.y + scrollTotal * 1.6) % (H+120)) - 60;
      ctx.beginPath(); ctx.moveTo(st.x*W, sy); ctx.lineTo(st.x*W, sy + st.len*(0.5+p)); ctx.stroke();
    }
  }

  // goal line (黒字ライン) — 残り時間×速度で接近してくる
  const remainPx = Math.max(0, GOAL_TIME - elapsed) * speed();
  const lineY = player.y - remainPx;
  if(lineY > -40 && mode === 'playing'){
    ctx.save();
    ctx.strokeStyle = '#f4c14f'; ctx.lineWidth = 3;
    ctx.shadowColor = '#f4c14f'; ctx.shadowBlur = 16;
    ctx.setLineDash([14, 10]);
    ctx.beginPath(); ctx.moveTo(0, lineY); ctx.lineTo(W, lineY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#f4c14f';
    ctx.font = '900 13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('― 黒 字 ラ イ ン ―', W/2, lineY - 12);
    ctx.restore();
  }

  // obstacles
  for(const o of obstacles) drawObstacle(ctx, o);

  // player
  if(mode === 'playing' || mode === 'clear'){
    drawDragon(ctx, player.x, player.y, player.tilt, player.wing, 1, demonOn);
  }

  // particles
  for(const pt of particles){
    ctx.globalAlpha = Math.max(0, pt.life);
    ctx.fillStyle = pt.color;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, 6.29); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ---------- HUD ---------- */
const moneyEl = document.getElementById('money');
const railFill = document.getElementById('railFill');
let lastMoneyTxt = '';
function drawHUD(){
  const remain = Math.max(0, GOAL_TIME - elapsed);
  const t = 'あと ' + remain.toFixed(1) + '秒';
  if(t !== lastMoneyTxt){
    moneyEl.textContent = t;
    moneyEl.classList.toggle('plus', remain <= 5);  // ラスト5秒は金色
    lastMoneyTxt = t;
  }
  railFill.style.height = (progress()*100).toFixed(1) + '%';
}

/* ---------- overlays ---------- */
function show(id){
  for(const ov of ['titleOv','overOv','clearOv'])
    document.getElementById(ov).classList.toggle('hidden', ov !== id);
}
function hideAll(){
  for(const ov of ['titleOv','overOv','clearOv'])
    document.getElementById(ov).classList.add('hidden');
}
function startGame(){
  audio(); sfx.start();
  reset(); hideAll();
  document.getElementById('hud').classList.add('on');
  mode = 'playing';
}
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);
document.getElementById('replayBtn').addEventListener('click', startGame);

/* ---------- title dragon ---------- */
const td = document.getElementById('titleDragon');
const tg = td.getContext('2d');
let tdT = 0;

/* ---------- main loop ---------- */
let last = performance.now();
function frame(now){
  let dt = (now - last) / 1000;
  last = now;
  if(dt > 0.1) dt = 0.1;   // タブ復帰時の暴走防止

  if(mode === 'playing') update(dt);
  if(mode === 'clear' && player){ player.y -= 260*dt; player.wing += dt*16; }
  if(mode !== 'title'){ draw(); drawHUD(); }

  if(mode === 'title'){
    tdT += dt;
    tg.clearRect(0,0,140,120);
    drawDragon(tg, 70, 62, Math.sin(tdT*1.2)*0.08, tdT*7, 1.1);
  }
  requestAnimationFrame(frame);
}
reset();
requestAnimationFrame(frame);

document.addEventListener('visibilitychange', () => { last = performance.now(); });
})();
</script>
